<!doctype html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="/vite.svg"/>
  <!-- 优化 viewport 支持 HiDPI -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Ferrum</title>
  <style>
  </style>
  <script>
      (function () {
          const cfg = JSON.parse(localStorage.getItem('app_config_cache') || '{}');
          const isLight = cfg.theme !== 'dark';
          const bg = cfg.background_color || (isLight ? '#f3f3f3' : '#222222');
          const border = isLight ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)';

          document.documentElement.style.setProperty('--dynamic-bg', bg);
          document.documentElement.style.setProperty('--dynamic-border', border);

          // Set HTML lang attribute from cached config
          if (cfg.language) document.documentElement.lang = cfg.language;

          // 如果是深色模式，立即给 html 加 class，防止 TitleBar 里的文字颜色闪烁
          if (!isLight) document.documentElement.classList.add('dark');
          else document.documentElement.classList.add('light');
      })();
  </script>
</head>

<body>
<div id="startup-skeleton">
  <div class="sk-title"></div>
  <div class="sk-content"></div>
  <div class="sk-bottom"></div>
</div>
<div id="app"></div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
